<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Custom Journey Activity</title>
    <!-- Include jQuery and Postmonger -->
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script type="text/javascript" src="js/postmonger.js"></script>
    <style>
        body {
            font-family: "Salesforce Sans", Arial, sans-serif;
            padding: 20px;
            font-size: 14px;
        }
        h3 {
            margin-top: 0;
            color: #032d60;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #3e3e3c;
        }
        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d8dde6;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #1589ee;
            box-shadow: 0 0 3px rgba(21, 137, 238, 0.5);
        }
        #fieldSelection {
            background-color: #fafaf9;
        }
    </style>
</head>
<body>
    <div id="step1" class="step">
        <h3>Send Data to Endpoint</h3>
        
        <label for="endpointUrl">Endpoint URL:</label>
        <input type="text" id="endpointUrl" class="form-control" placeholder="https://your-api.com/receive" style="margin-bottom: 10px;">
        <button id="testConnection" style="margin-bottom: 15px; padding: 6px 16px; background-color: #0070d2; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">Test Connection</button>
        <div id="testResult" style="display: none; margin-bottom: 15px; padding: 10px; border-radius: 4px; font-size: 13px; word-break: break-word;"></div>
        
        <label><strong>Select Fields to Send:</strong></label>
        <div id="fieldSelection" style="max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 15px;">
            <!-- Checkboxes will be populated here -->
        </div>

        <label><strong>Journey Context Fields:</strong></label>
        <div id="journeyContextFields" style="max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; background-color: #fafaf9;">
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="journeyId" style="margin-right: 8px;">Journey ID</label></div>
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="journeyKey" style="margin-right: 8px;">Journey Key</label></div>
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="journeyName" style="margin-right: 8px;">Journey Name</label></div>
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="activityId" style="margin-right: 8px;">Activity ID</label></div>
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="activityKey" style="margin-right: 8px;">Activity Key</label></div>
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="activityName" style="margin-right: 8px;">Activity Name</label></div>
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="definitionInstanceId" style="margin-right: 8px;">Definition Instance ID</label></div>
            <div style="margin-bottom: 8px;"><label style="cursor: pointer;"><input type="checkbox" class="journey-checkbox" value="activityInstanceId" style="margin-right: 8px;">Activity Instance ID</label></div>
        </div>
    </div>

    <!-- Load your custom logic last -->
    <script type="text/javascript" src="js/test.js"></script>
</body>
</html>
